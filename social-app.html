<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vybe — Le réseau social</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #fc5c8a;
    --text: #f0f0f8;
    --muted: #7070a0;
    --success: #3dcc8a;
    --radius: 16px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,92,252,0.18) 0%, transparent 70%);
  }
  .auth-logo { font-family:var(--font-head); font-size:52px; font-weight:800; letter-spacing:-2px; margin-bottom:6px; }
  .auth-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .auth-tagline { color:var(--muted); font-size:15px; margin-bottom:40px; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; width:100%; max-width:420px; }
  .auth-tabs { display:flex; gap:4px; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:28px; }
  .auth-tab { flex:1; padding:9px; border:none; background:transparent; color:var(--muted); font-family:var(--font-body); font-size:14px; font-weight:500; border-radius:8px; cursor:pointer; transition:all .2s; }
  .auth-tab.active { background:var(--accent); color:#fff; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:7px; }
  .field input { width:100%; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--font-body); font-size:15px; outline:none; transition:border-color .2s; }
  .field input:focus { border-color:var(--accent); }
  .btn-primary { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:11px; color:#fff; font-family:var(--font-head); font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.5px; transition:opacity .2s,transform .1s; }
  .btn-primary:hover { opacity:.88; }
  .btn-primary:active { transform:scale(.98); }
  .auth-error { color:#ff6b8a; font-size:13px; margin-top:10px; text-align:center; min-height:18px; }

  /* ── APP SHELL ── */
  #app { display:none; flex-direction:column; min-height:100vh; max-width:480px; margin:0 auto; position:relative; }

  /* TOP BAR */
  .topbar { position:sticky; top:0; z-index:100; background:rgba(10,10,15,.88); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
  .topbar-logo { font-family:var(--font-head); font-size:22px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .topbar-right { display:flex; gap:10px; align-items:center; }
  .icon-btn { width:38px; height:38px; border:none; background:var(--surface2); border-radius:50%; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; font-size:17px; transition:background .2s; position:relative; }
  .icon-btn:hover { background:var(--border); }
  .notif-dot { position:absolute; top:5px; right:5px; width:8px; height:8px; background:var(--accent2); border-radius:50%; border:2px solid var(--bg); }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:100; background:rgba(10,10,15,.92); backdrop-filter:blur(16px); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:10px 0 20px; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--muted); cursor:pointer; padding:6px 18px; border-radius:12px; transition:color .2s; font-size:12px; }
  .nav-btn.active { color:var(--accent); }
  .nav-btn svg { width:22px; height:22px; stroke-width:1.8; }

  /* PAGES */
  .page { display:none; padding:16px 0 90px; }
  .page.active { display:block; }

  /* FEED */
  .compose-bar { display:flex; gap:12px; align-items:flex-start; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin:0 16px 16px; }
  .avatar { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-weight:700; font-size:15px; color:#fff; }
  .compose-input { flex:1; background:none; border:none; color:var(--text); font-family:var(--font-body); font-size:15px; resize:none; outline:none; padding-top:3px; min-height:48px; }
  .compose-input::placeholder { color:var(--muted); }
  .post-btn { padding:8px 18px; background:var(--accent); border:none; border-radius:20px; color:#fff; font-family:var(--font-head); font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap; transition:opacity .2s; }
  .post-btn:hover { opacity:.85; }

  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin:0 16px 12px; transition:border-color .2s; }
  .post-card:hover { border-color:var(--accent); }
  .post-header { display:flex; gap:12px; align-items:center; margin-bottom:12px; }
  .post-header-info { flex:1; }
  .post-username { font-family:var(--font-head); font-size:15px; font-weight:700; cursor:pointer; }
  .post-username:hover { color:var(--accent); }
  .post-handle { font-size:13px; color:var(--muted); }
  .post-time { font-size:12px; color:var(--muted); margin-left:auto; }
  .post-body { font-size:15px; line-height:1.6; margin-bottom:14px; word-break:break-word; }
  .post-actions { display:flex; gap:6px; }
  .action-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; background:var(--surface2); border:none; border-radius:20px; color:var(--muted); font-size:13px; cursor:pointer; transition:all .2s; font-family:var(--font-body); }
  .action-btn:hover { background:var(--border); color:var(--text); }
  .action-btn.liked { color:var(--accent2); background:rgba(252,92,138,.12); }
  .action-btn svg { width:15px; height:15px; stroke-width:2; }
  .empty-feed { text-align:center; padding:60px 24px; color:var(--muted); }
  .empty-feed h3 { font-family:var(--font-head); font-size:20px; color:var(--text); margin-bottom:8px; }

  /* COMMENTS MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal-sheet { background:var(--surface); border-radius:var(--radius) var(--radius) 0 0; width:100%; max-width:480px; max-height:80vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .3s cubic-bezier(.34,1.2,.64,1); }
  .modal-overlay.open .modal-sheet { transform:translateY(0); }
  .modal-header { padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .modal-header h3 { font-family:var(--font-head); font-size:17px; }
  .close-btn { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1; }
  .comments-list { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .comment-item { display:flex; gap:10px; }
  .comment-body { flex:1; }
  .comment-author { font-family:var(--font-head); font-size:13px; font-weight:700; margin-bottom:3px; }
  .comment-text { font-size:14px; line-height:1.5; }
  .comment-time { font-size:11px; color:var(--muted); margin-top:3px; }
  .comment-input-area { padding:14px 16px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-shrink:0; }
  .comment-input-area input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:10px 16px; color:var(--text); font-family:var(--font-body); font-size:14px; outline:none; }
  .send-btn { width:36px; height:36px; background:var(--accent); border:none; border-radius:50%; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  /* EXPLORE / SEARCH */
  .search-bar { display:flex; gap:10px; margin:0 16px 20px; }
  .search-bar input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-family:var(--font-body); font-size:15px; outline:none; }
  .search-bar input:focus { border-color:var(--accent); }
  .user-card { display:flex; gap:14px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin:0 16px 10px; }
  .user-card-info { flex:1; }
  .user-card-name { font-family:var(--font-head); font-weight:700; font-size:15px; cursor:pointer; }
  .user-card-name:hover { color:var(--accent); }
  .user-card-bio { font-size:13px; color:var(--muted); margin-top:2px; }
  .follow-btn { padding:8px 18px; border-radius:20px; font-family:var(--font-head); font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
  .follow-btn.not-following { background:var(--accent); border:none; color:#fff; }
  .follow-btn.following { background:transparent; border:1.5px solid var(--border); color:var(--muted); }
  .follow-btn.not-following:hover { opacity:.85; }
  .follow-btn.following:hover { border-color:var(--accent2); color:var(--accent2); }

  /* PROFILE PAGE */
  .profile-hero { padding:28px 20px 0; }
  .profile-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
  .profile-avatar { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-weight:800; font-size:26px; color:#fff; }
  .profile-name { font-family:var(--font-head); font-size:22px; font-weight:800; }
  .profile-handle { color:var(--muted); font-size:14px; margin-bottom:10px; }
  .profile-bio { font-size:14px; line-height:1.6; color:var(--text); margin-bottom:16px; }
  .profile-stats { display:flex; gap:24px; margin-bottom:20px; }
  .stat-item { text-align:center; }
  .stat-num { font-family:var(--font-head); font-size:20px; font-weight:800; }
  .stat-label { font-size:12px; color:var(--muted); }
  .profile-divider { height:1px; background:var(--border); margin:0 16px; }
  .profile-posts-title { font-family:var(--font-head); font-size:14px; font-weight:700; padding:18px 20px 8px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
  .edit-profile-btn { padding:9px 20px; background:transparent; border:1.5px solid var(--border); border-radius:20px; color:var(--text); font-family:var(--font-head); font-size:14px; font-weight:700; cursor:pointer; transition:border-color .2s; }
  .edit-profile-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* MESSAGES PAGE */
  .msg-section-title { font-family:var(--font-head); font-size:18px; font-weight:800; padding:16px 20px 12px; }
  .conv-item { display:flex; gap:12px; align-items:center; padding:14px 18px; cursor:pointer; transition:background .15s; }
  .conv-item:hover { background:var(--surface); }
  .conv-info { flex:1; min-width:0; }
  .conv-name { font-family:var(--font-head); font-weight:700; font-size:15px; }
  .conv-preview { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .conv-time { font-size:11px; color:var(--muted); flex-shrink:0; }
  .conv-unread { width:9px; height:9px; background:var(--accent); border-radius:50%; flex-shrink:0; }

  /* CHAT VIEW */
  #chat-view { display:none; flex-direction:column; position:fixed; inset:0; background:var(--bg); z-index:150; max-width:480px; left:50%; transform:translateX(-50%); }
  #chat-view.open { display:flex; }
  .chat-header { background:rgba(10,10,15,.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .back-btn { background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; line-height:1; }
  .chat-with { font-family:var(--font-head); font-size:16px; font-weight:700; }
  .chat-messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:10px; }
  .msg-bubble { max-width:72%; padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; word-break:break-word; }
  .msg-bubble.me { align-self:flex-end; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-bottom-right-radius:4px; }
  .msg-bubble.them { align-self:flex-start; background:var(--surface2); border-bottom-left-radius:4px; }
  .msg-time { font-size:10px; opacity:.65; margin-top:3px; text-align:right; }
  .msg-time.them { text-align:left; }
  .chat-input-bar { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-shrink:0; background:var(--bg); }
  .chat-input-bar input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:11px 18px; color:var(--text); font-family:var(--font-body); font-size:14px; outline:none; transition:border-color .2s; }
  .chat-input-bar input:focus { border-color:var(--accent); }

  /* EDIT PROFILE MODAL */
  #edit-modal { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; }
  #edit-modal.open { display:flex; }
  .edit-card { background:var(--surface); border-radius:var(--radius); padding:28px; width:100%; max-width:420px; }
  .edit-card h3 { font-family:var(--font-head); font-size:20px; font-weight:800; margin-bottom:22px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* MISC */
  .page-title { font-family:var(--font-head); font-size:22px; font-weight:800; padding:16px 20px 12px; }
  .divider { height:1px; background:var(--border); margin:4px 0; }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:11px 22px; font-size:14px; z-index:500; opacity:0; pointer-events:none; transition:opacity .3s; white-space:nowrap; }
  .toast.show { opacity:1; }
  .no-results { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
</style>
</head>
<body>

<!-- ═══════════════════ AUTH SCREEN ═══════════════════ -->
<div id="auth-screen">
  <div class="auth-logo"><span>Vybe</span></div>
  <p class="auth-tagline">Exprime-toi. Connecte-toi. Vis.</p>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Inscription</button>
    </div>
    <!-- LOGIN -->
    <div id="login-form">
      <div class="field"><label>Nom d'utilisateur</label><input type="text" id="login-username" placeholder="ton_pseudo"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="login()">Se connecter</button>
      <p class="auth-error" id="login-error"></p>
    </div>
    <!-- REGISTER -->
    <div id="register-form" style="display:none">
      <div class="field"><label>Prénom & Nom</label><input type="text" id="reg-name" placeholder="Jean Dupont"></div>
      <div class="field"><label>Nom d'utilisateur</label><input type="text" id="reg-username" placeholder="jean_dupont"></div>
      <div class="field"><label>Bio (optionnel)</label><input type="text" id="reg-bio" placeholder="Je suis..."></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="register()">Créer mon compte</button>
      <p class="auth-error" id="reg-error"></p>
    </div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">Vybe</div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="showPage('messages')" title="Messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="notif-dot" id="msg-dot" style="display:none"></span>
      </button>
      <button class="icon-btn" onclick="logout()" title="Déconnexion" style="font-size:14px;">⏻</button>
    </div>
  </div>

  <!-- PAGES -->
  <div id="page-feed" class="page active">
    <div class="compose-bar">
      <div class="avatar" id="compose-avatar"></div>
      <textarea class="compose-input" id="post-input" placeholder="Quoi de neuf ? Partage..." rows="2"></textarea>
      <button class="post-btn" onclick="createPost()">Poster</button>
    </div>
    <div id="feed-list"></div>
  </div>

  <div id="page-explore" class="page">
    <div class="page-title">Explorer</div>
    <div class="search-bar"><input type="text" id="search-input" placeholder="Rechercher un utilisateur..." oninput="searchUsers()"></div>
    <div id="explore-list"></div>
  </div>

  <div id="page-profile" class="page">
    <div class="profile-hero">
      <div class="profile-top">
        <div class="profile-avatar" id="profile-avatar"></div>
        <button class="edit-profile-btn" onclick="openEditModal()">Modifier</button>
      </div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-handle" id="profile-handle"></div>
      <div class="profile-bio" id="profile-bio"></div>
      <div class="profile-stats">
        <div class="stat-item"><div class="stat-num" id="stat-posts">0</div><div class="stat-label">Posts</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-followers">0</div><div class="stat-label">Abonnés</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-following">0</div><div class="stat-label">Abonnements</div></div>
      </div>
    </div>
    <div class="profile-divider"></div>
    <div class="profile-posts-title">Publications</div>
    <div id="profile-posts-list"></div>
  </div>

  <div id="page-messages" class="page">
    <div class="msg-section-title">Messages</div>
    <div id="conv-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-feed" onclick="showPage('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="nav-btn" id="nav-explore" onclick="showPage('explore')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Explorer
    </button>
    <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profil
    </button>
    <button class="nav-btn" id="nav-messages" onclick="showPage('messages')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </button>
  </div>
</div>

<!-- COMMENTS MODAL -->
<div class="modal-overlay" id="comments-modal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3>Commentaires</h3>
      <button class="close-btn" onclick="closeComments()">×</button>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-input-area">
      <div class="avatar" id="comment-avatar" style="width:32px;height:32px;font-size:12px;"></div>
      <input type="text" id="comment-input" placeholder="Écrire un commentaire..." onkeydown="if(event.key==='Enter')submitComment()">
      <button class="send-btn" onclick="submitComment()">➤</button>
    </div>
  </div>
</div>

<!-- CHAT VIEW -->
<div id="chat-view">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:13px;"></div>
    <div class="chat-with" id="chat-with-name"></div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div id="edit-modal">
  <div class="edit-card">
    <h3>Modifier le profil</h3>
    <div class="field"><label>Prénom & Nom</label><input type="text" id="edit-name"></div>
    <div class="field"><label>Bio</label><input type="text" id="edit-bio" placeholder="Parle de toi..."></div>
    <div class="field"><label>Nouveau mot de passe (laisser vide pour garder)</label><input type="password" id="edit-pass"></div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="edit-profile-btn" onclick="closeEditModal()" style="flex:1;">Annuler</button>
      <button class="btn-primary" onclick="saveProfile()" style="flex:1;">Sauvegarder</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  STORAGE HELPERS
// ════════════════════════════════════════════
const DB = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

const getUsers    = () => DB.get('vybe_users', {});
const saveUsers   = u  => DB.set('vybe_users', u);
const getPosts    = () => DB.get('vybe_posts', []);
const savePosts   = p  => DB.set('vybe_posts', p);
const getMessages = () => DB.get('vybe_messages', {});
const saveMessages= m  => DB.set('vybe_messages', m);

let currentUser = null;
let activeCommentPostId = null;
let activeChatWith = null;

// ════════════════════════════════════════════
//  AVATAR COLOR
// ════════════════════════════════════════════
const COLORS = ['#7c5cfc','#fc5c8a','#3dcc8a','#fcb05c','#5cc4fc','#e05cfc','#fc5c5c'];
function avatarColor(username) {
  let h = 0; for (let c of username) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}
function avatarInitial(name) { return (name || '?')[0].toUpperCase(); }
function renderAvatar(el, name, username, size=40) {
  el.style.background = avatarColor(username || name);
  el.style.width = el.style.height = size + 'px';
  el.style.fontSize = Math.floor(size * 0.38) + 'px';
  el.textContent = avatarInitial(name);
}

// ════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').style.display    = tab==='login'   ? '' : 'none';
  document.getElementById('register-form').style.display = tab==='register'? '' : 'none';
}

function register() {
  const name = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.trim().toLowerCase().replace(/\s+/g,'_');
  const bio  = document.getElementById('reg-bio').value.trim();
  const pass = document.getElementById('reg-password').value;
  const err  = document.getElementById('reg-error');
  if (!name||!username||!pass) { err.textContent='Remplis tous les champs obligatoires.'; return; }
  if (username.length < 3) { err.textContent='Pseudo trop court (min 3 caractères).'; return; }
  if (pass.length < 6) { err.textContent='Mot de passe trop court (min 6 caractères).'; return; }
  const users = getUsers();
  if (users[username]) { err.textContent='Ce pseudo est déjà pris.'; return; }
  err.textContent = '';
  users[username] = { name, username, bio, pass, followers:[], following:[], joined: Date.now() };
  saveUsers(users);
  loginAs(username);
}

function login() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const pass = document.getElementById('login-password').value;
  const err  = document.getElementById('login-error');
  const users = getUsers();
  if (!users[username]) { err.textContent='Utilisateur introuvable.'; return; }
  if (users[username].pass !== pass) { err.textContent='Mot de passe incorrect.'; return; }
  err.textContent = '';
  loginAs(username);
}

function loginAs(username) {
  currentUser = username;
  localStorage.setItem('vybe_session', username);
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  initApp();
}

function logout() {
  localStorage.removeItem('vybe_session');
  currentUser = null;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function initApp() {
  renderComposeBar();
  showPage('feed');
}

function renderComposeBar() {
  const users = getUsers();
  const u = users[currentUser];
  renderAvatar(document.getElementById('compose-avatar'), u.name, u.username);
  renderAvatar(document.getElementById('comment-avatar'), u.name, u.username, 32);
}

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='feed')     renderFeed();
  if (name==='explore')  renderExplore('');
  if (name==='profile')  renderProfile(currentUser);
  if (name==='messages') renderConversations();
}

// ════════════════════════════════════════════
//  POSTS
// ════════════════════════════════════════════
function createPost() {
  const txt = document.getElementById('post-input').value.trim();
  if (!txt) return;
  const posts = getPosts();
  posts.unshift({ id: Date.now(), author: currentUser, body: txt, likes:[], comments:[], time: Date.now() });
  savePosts(posts);
  document.getElementById('post-input').value = '';
  renderFeed();
  showToast('Post publié !');
}

function renderFeed() {
  const posts  = getPosts();
  const users  = getUsers();
  const me     = users[currentUser];
  const visible= posts.filter(p => p.author===currentUser || (me.following||[]).includes(p.author));
  const list   = document.getElementById('feed-list');
  if (!visible.length) {
    list.innerHTML = `<div class="empty-feed"><h3>Aucun post pour l'instant</h3><p>Abonne-toi à des personnes pour voir leurs posts, ou crée le premier !</p></div>`;
    return;
  }
  list.innerHTML = visible.map(p=>postHTML(p, users)).join('');
}

function postHTML(p, users) {
  const u = users[p.author] || { name: p.author, username: p.author };
  const liked = (p.likes||[]).includes(currentUser);
  const col = avatarColor(u.username);
  const init = avatarInitial(u.name);
  const ago = timeAgo(p.time);
  return `
  <div class="post-card" id="post-${p.id}">
    <div class="post-header">
      <div class="avatar" style="background:${col};width:40px;height:40px;font-size:15px;" onclick="viewUserProfile('${u.username}')">${init}</div>
      <div class="post-header-info">
        <div class="post-username" onclick="viewUserProfile('${u.username}')">${u.name}</div>
        <div class="post-handle">@${u.username}</div>
      </div>
      <div class="post-time">${ago}</div>
    </div>
    <div class="post-body">${escHtml(p.body)}</div>
    <div class="post-actions">
      <button class="action-btn ${liked?'liked':''}" onclick="toggleLike(${p.id})">
        <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${(p.likes||[]).length}
      </button>
      <button class="action-btn" onclick="openComments(${p.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        ${(p.comments||[]).length}
      </button>
      ${p.author!==currentUser?`<button class="action-btn" onclick="openChatWith('${p.author}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Message
      </button>`:''}
    </div>
  </div>`;
}

function toggleLike(postId) {
  const posts = getPosts();
  const p = posts.find(x=>x.id===postId);
  if (!p) return;
  const idx = (p.likes||[]).indexOf(currentUser);
  if (idx>=0) p.likes.splice(idx,1); else p.likes.push(currentUser);
  savePosts(posts);
  renderFeed();
}

// ════════════════════════════════════════════
//  COMMENTS
// ════════════════════════════════════════════
function openComments(postId) {
  activeCommentPostId = postId;
  renderCommentsList();
  document.getElementById('comments-modal').classList.add('open');
}
function closeComments() {
  document.getElementById('comments-modal').classList.remove('open');
  activeCommentPostId = null;
}
function renderCommentsList() {
  const posts  = getPosts();
  const users  = getUsers();
  const p = posts.find(x=>x.id===activeCommentPostId);
  if (!p) return;
  const list = document.getElementById('comments-list');
  if (!(p.comments||[]).length) { list.innerHTML=`<p style="color:var(--muted);text-align:center;padding:30px;">Sois le premier à commenter !</p>`; return; }
  list.innerHTML = p.comments.map(c=>{
    const u = users[c.author]||{ name:c.author, username:c.author };
    const col=avatarColor(u.username), init=avatarInitial(u.name);
    return `<div class="comment-item">
      <div class="avatar" style="background:${col};width:34px;height:34px;font-size:13px;flex-shrink:0;">${init}</div>
      <div class="comment-body">
        <div class="comment-author">${u.name} <span style="font-weight:400;color:var(--muted);font-family:var(--font-body);">@${u.username}</span></div>
        <div class="comment-text">${escHtml(c.text)}</div>
        <div class="comment-time">${timeAgo(c.time)}</div>
      </div>
    </div>`;
  }).join('');
}
function submitComment() {
  const inp = document.getElementById('comment-input');
  const txt = inp.value.trim();
  if (!txt||!activeCommentPostId) return;
  const posts = getPosts();
  const p = posts.find(x=>x.id===activeCommentPostId);
  if (!p) return;
  if (!p.comments) p.comments=[];
  p.comments.push({ author:currentUser, text:txt, time:Date.now() });
  savePosts(posts);
  inp.value='';
  renderCommentsList();
  renderFeed();
}

// ════════════════════════════════════════════
//  EXPLORE / SEARCH
// ════════════════════════════════════════════
function searchUsers() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  renderExplore(q);
}
function renderExplore(q) {
  const users = getUsers();
  const me = users[currentUser];
  let list = Object.values(users).filter(u=>u.username!==currentUser);
  if (q) list = list.filter(u=>u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q));
  const el = document.getElementById('explore-list');
  if (!list.length) { el.innerHTML=`<div class="no-results">Aucun utilisateur trouvé</div>`; return; }
  el.innerHTML = list.map(u=>{
    const following = (me.following||[]).includes(u.username);
    const col=avatarColor(u.username), init=avatarInitial(u.name);
    const followersCount = (u.followers||[]).length;
    return `<div class="user-card">
      <div class="avatar" style="background:${col};width:46px;height:46px;font-size:17px;" onclick="viewUserProfile('${u.username}')">${init}</div>
      <div class="user-card-info">
        <div class="user-card-name" onclick="viewUserProfile('${u.username}')">${u.name}</div>
        <div class="user-card-bio">@${u.username}${u.bio?' · '+u.bio:''} · ${followersCount} abonné${followersCount!==1?'s':''}</div>
      </div>
      <button class="follow-btn ${following?'following':'not-following'}" onclick="toggleFollow('${u.username}')">${following?'Abonné':'Suivre'}</button>
    </div>`;
  }).join('');
}
function toggleFollow(target) {
  const users = getUsers();
  const me = users[currentUser];
  const them = users[target];
  if (!me||!them) return;
  if (!me.following) me.following=[];
  if (!them.followers) them.followers=[];
  const idx = me.following.indexOf(target);
  if (idx>=0) { me.following.splice(idx,1); them.followers.splice(them.followers.indexOf(currentUser),1); }
  else { me.following.push(target); them.followers.push(currentUser); }
  users[currentUser]=me; users[target]=them;
  saveUsers(users);
  const q = document.getElementById('search-input')?.value||'';
  renderExplore(q.toLowerCase());
}

// ════════════════════════════════════════════
//  PROFILE
// ════════════════════════════════════════════
function renderProfile(username) {
  const users = getUsers();
  const u = users[username];
  if (!u) return;
  renderAvatar(document.getElementById('profile-avatar'), u.name, u.username, 72);
  document.getElementById('profile-name').textContent = u.name;
  document.getElementById('profile-handle').textContent = '@'+u.username;
  document.getElementById('profile-bio').textContent = u.bio||'';
  const posts = getPosts().filter(p=>p.author===username);
  document.getElementById('stat-posts').textContent = posts.length;
  document.getElementById('stat-followers').textContent = (u.followers||[]).length;
  document.getElementById('stat-following').textContent = (u.following||[]).length;
  const plist = document.getElementById('profile-posts-list');
  if (!posts.length) { plist.innerHTML=`<div style="color:var(--muted);text-align:center;padding:40px 0;font-size:14px;">Aucun post encore</div>`; return; }
  plist.innerHTML = posts.map(p=>postHTML(p, users)).join('');
}

function viewUserProfile(username) {
  // Switch to a mini profile view inline
  const users = getUsers();
  const u = users[username];
  if (!u) return;
  if (username===currentUser) { showPage('profile'); return; }
  // render in profile page then switch
  showPage('profile');
  // Override with visited user data
  renderAvatar(document.getElementById('profile-avatar'), u.name, u.username, 72);
  document.getElementById('profile-name').textContent = u.name;
  document.getElementById('profile-handle').textContent = '@'+u.username;
  document.getElementById('profile-bio').textContent = u.bio||'';
  const posts = getPosts().filter(p=>p.author===username);
  document.getElementById('stat-posts').textContent = posts.length;
  document.getElementById('stat-followers').textContent = (u.followers||[]).length;
  document.getElementById('stat-following').textContent = (u.following||[]).length;
  const me = users[currentUser];
  const following = (me.following||[]).includes(username);
  const editBtn = document.querySelector('.edit-profile-btn');
  editBtn.textContent = following ? 'Abonné ✓' : 'Suivre';
  editBtn.onclick = () => { toggleFollow(username); viewUserProfile(username); };
  const plist = document.getElementById('profile-posts-list');
  plist.innerHTML = posts.map(p=>postHTML(p, users)).join('');
}

// ════════════════════════════════════════════
//  EDIT PROFILE
// ════════════════════════════════════════════
function openEditModal() {
  const u = getUsers()[currentUser];
  document.getElementById('edit-name').value = u.name;
  document.getElementById('edit-bio').value  = u.bio||'';
  document.getElementById('edit-pass').value = '';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }
function saveProfile() {
  const users = getUsers();
  const u = users[currentUser];
  const name = document.getElementById('edit-name').value.trim();
  const bio  = document.getElementById('edit-bio').value.trim();
  const pass = document.getElementById('edit-pass').value;
  if (!name) return;
  u.name = name; u.bio = bio;
  if (pass.length>=6) u.pass = pass;
  users[currentUser] = u;
  saveUsers(users);
  closeEditModal();
  renderComposeBar();
  renderProfile(currentUser);
  // reset edit button
  const editBtn = document.querySelector('.edit-profile-btn');
  editBtn.textContent = 'Modifier';
  editBtn.onclick = openEditModal;
  showToast('Profil mis à jour !');
}

// ════════════════════════════════════════════
//  MESSAGES
// ════════════════════════════════════════════
function convKey(a, b) { return [a,b].sort().join('__'); }

function renderConversations() {
  const users  = getUsers();
  const me     = users[currentUser];
  const msgs   = getMessages();
  const following = me.following||[];
  const el = document.getElementById('conv-list');
  if (!following.length) {
    el.innerHTML=`<div style="color:var(--muted);text-align:center;padding:50px 20px;font-size:14px;">Abonne-toi à des personnes pour leur écrire !</div>`;
    return;
  }
  el.innerHTML = following.map(uid=>{
    const u = users[uid]; if(!u) return '';
    const key = convKey(currentUser, uid);
    const conv = msgs[key]||[];
    const last = conv[conv.length-1];
    const col=avatarColor(u.username), init=avatarInitial(u.name);
    return `<div class="conv-item" onclick="openChatWith('${uid}')">
      <div class="avatar" style="background:${col};width:46px;height:46px;font-size:17px;flex-shrink:0;">${init}</div>
      <div class="conv-info">
        <div class="conv-name">${u.name}</div>
        <div class="conv-preview">${last?escHtml(last.text.substring(0,50)):'Commencer la conversation...'}</div>
      </div>
      ${last?`<div class="conv-time">${timeAgo(last.time)}</div>`:''}
    </div>`;
  }).join('');
}

function openChatWith(uid) {
  const users = getUsers();
  const u = users[uid]; if (!u) return;
  activeChatWith = uid;
  const chatView = document.getElementById('chat-view');
  renderAvatar(document.getElementById('chat-avatar'), u.name, u.username, 36);
  document.getElementById('chat-with-name').textContent = u.name;
  renderChatMessages();
  chatView.classList.add('open');
  setTimeout(()=>{
    const cm = document.getElementById('chat-messages');
    cm.scrollTop = cm.scrollHeight;
  },50);
}
function closeChat() {
  document.getElementById('chat-view').classList.remove('open');
  activeChatWith = null;
  if (document.getElementById('page-messages').classList.contains('active')) renderConversations();
}
function renderChatMessages() {
  const msgs = getMessages();
  const key  = convKey(currentUser, activeChatWith);
  const conv = msgs[key]||[];
  const el   = document.getElementById('chat-messages');
  if (!conv.length) { el.innerHTML=`<div style="color:var(--muted);text-align:center;padding:40px;font-size:14px;">Envoie le premier message !</div>`; return; }
  el.innerHTML = conv.map(m=>{
    const isMe = m.from===currentUser;
    return `<div>
      <div class="msg-bubble ${isMe?'me':'them'}">${escHtml(m.text)}</div>
      <div class="msg-time ${isMe?'':'them'}">${timeAgo(m.time)}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}
function sendMessage() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if (!txt||!activeChatWith) return;
  const msgs = getMessages();
  const key  = convKey(currentUser, activeChatWith);
  if (!msgs[key]) msgs[key]=[];
  msgs[key].push({ from:currentUser, text:txt, time:Date.now() });
  saveMessages(msgs);
  inp.value='';
  renderChatMessages();
}

// ════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════
function timeAgo(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return 'maintenant';
  if (s<3600) return Math.floor(s/60)+'min';
  if (s<86400) return Math.floor(s/3600)+'h';
  if (s<604800) return Math.floor(s/86400)+'j';
  return new Date(ts).toLocaleDateString('fr');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(function boot() {
  const saved = localStorage.getItem('vybe_session');
  if (saved && getUsers()[saved]) {
    currentUser = saved;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    initApp();
  }
})();
</script>
</body>
</html>
