<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vybe — Le réseau social</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════ AUTH SCREEN ═══════════════════ -->
<div id="auth-screen">
  <div class="auth-logo"><span>Vybe</span></div>
  <p class="auth-tagline">Exprime-toi. Connecte-toi. Vis.</p>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Inscription</button>
    </div>

    <!-- CONNEXION -->
    <div id="login-form">
      <div class="field">
        <label>Nom d'utilisateur</label>
        <input type="text" id="login-username" placeholder="ton_pseudo">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">Se connecter</button>
      <p class="auth-error" id="login-error"></p>
    </div>

    <!-- INSCRIPTION -->
    <div id="register-form" style="display:none">
      <div class="field">
        <label>Prénom &amp; Nom</label>
        <input type="text" id="reg-name" placeholder="Jean Dupont">
      </div>
      <div class="field">
        <label>Nom d'utilisateur</label>
        <input type="text" id="reg-username" placeholder="jean_dupont">
      </div>
      <div class="field">
        <label>Bio (optionnel)</label>
        <input type="text" id="reg-bio" placeholder="Je suis...">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="register()">Créer mon compte</button>
      <p class="auth-error" id="reg-error"></p>
    </div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">Vybe</div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="showPage('messages')" title="Messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="notif-dot" id="msg-dot" style="display:none"></span>
      </button>
      <button class="icon-btn" onclick="logout()" title="Déconnexion" style="font-size:14px;">⏻</button>
    </div>
  </div>

  <!-- PAGE : ACCUEIL / FEED -->
  <div id="page-feed" class="page active">
    <div class="compose-bar">
      <div class="avatar" id="compose-avatar"></div>
      <textarea class="compose-input" id="post-input" placeholder="Quoi de neuf ? Partage..." rows="2"></textarea>
      <button class="post-btn" onclick="createPost()">Poster</button>
    </div>
    <div id="feed-list"></div>
  </div>

  <!-- PAGE : EXPLORER -->
  <div id="page-explore" class="page">
    <div class="page-title">Explorer</div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Rechercher un utilisateur..." oninput="searchUsers()">
    </div>
    <div id="explore-list"></div>
  </div>

  <!-- PAGE : PROFIL -->
  <div id="page-profile" class="page">
    <div class="profile-hero">
      <div class="profile-top">
        <div class="profile-avatar" id="profile-avatar"></div>
        <button class="edit-profile-btn" onclick="openEditModal()">Modifier</button>
      </div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-handle" id="profile-handle"></div>
      <div class="profile-bio" id="profile-bio"></div>
      <div class="profile-stats">
        <div class="stat-item">
          <div class="stat-num" id="stat-posts">0</div>
          <div class="stat-label">Posts</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-followers">0</div>
          <div class="stat-label">Abonnés</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-following">0</div>
          <div class="stat-label">Abonnements</div>
        </div>
      </div>
    </div>
    <div class="profile-divider"></div>
    <div class="profile-posts-title">Publications</div>
    <div id="profile-posts-list"></div>
  </div>

  <!-- PAGE : MESSAGES -->
  <div id="page-messages" class="page">
    <div class="msg-section-title">Messages</div>
    <div id="conv-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-feed" onclick="showPage('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Accueil
    </button>
    <button class="nav-btn" id="nav-explore" onclick="showPage('explore')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Explorer
    </button>
    <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profil
    </button>
    <button class="nav-btn" id="nav-messages" onclick="showPage('messages')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Messages
    </button>
  </div>
</div>

<!-- ═══════════════════ MODAL COMMENTAIRES ═══════════════════ -->
<div class="modal-overlay" id="comments-modal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3>Commentaires</h3>
      <button class="close-btn" onclick="closeComments()">×</button>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-input-area">
      <div class="avatar" id="comment-avatar" style="width:32px;height:32px;font-size:12px;"></div>
      <input type="text" id="comment-input" placeholder="Écrire un commentaire..."
             onkeydown="if(event.key==='Enter') submitComment()">
      <button class="send-btn" onclick="submitComment()">➤</button>
    </div>
  </div>
</div>

<!-- ═══════════════════ VUE CHAT ═══════════════════ -->
<div id="chat-view">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:13px;"></div>
    <div class="chat-with" id="chat-with-name"></div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="Message..."
           onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- ═══════════════════ MODAL MODIFIER PROFIL ═══════════════════ -->
<div id="edit-modal">
  <div class="edit-card">
    <h3>Modifier le profil</h3>
    <div class="field">
      <label>Prénom &amp; Nom</label>
      <input type="text" id="edit-name">
    </div>
    <div class="field">
      <label>Bio</label>
      <input type="text" id="edit-bio" placeholder="Parle de toi...">
    </div>
    <div class="field">
      <label>Nouveau mot de passe (laisser vide pour garder)</label>
      <input type="password" id="edit-pass">
    </div>
    <div class="edit-actions">
      <button class="edit-profile-btn" onclick="closeEditModal()">Annuler</button>
      <button class="btn-primary" onclick="saveProfile()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
