<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vybe</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- LOADER -->
<div id="loader"><div class="loader-logo"><span>Vybe</span></div><div class="loader-spinner"></div></div>

<!-- AUTH -->
<div id="auth-screen" style="display:none">
  <div class="auth-logo"><span>Vybe</span></div>
  <p class="auth-tagline">Exprime-toi. Connecte-toi. Vis.</p>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Inscription</button>
    </div>
    <div id="login-form">
      <div class="field"><label>Nom d'utilisateur</label><input type="text" id="login-username" placeholder="ton_pseudo"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="login-password" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="login()">Se connecter</button>
      <button class="forgot-btn" onclick="showForgotPassword()">Mot de passe oublié ?</button>
      <p class="auth-error" id="login-error"></p>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>Prénom &amp; Nom</label><input type="text" id="reg-name" placeholder="Jean Dupont"/></div>
      <div class="field"><label>Nom d'utilisateur</label><input type="text" id="reg-username" placeholder="jean_dupont"/></div>
      <div class="field"><label>Bio (optionnel)</label><input type="text" id="reg-bio" placeholder="Je suis..."/></div>
      <div class="field"><label>Email <span style="color:var(--muted);font-size:11px;">(pour récupérer ton compte)</span></label><input type="email" id="reg-email" placeholder="ton@email.com"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-password" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="register()">Créer mon compte</button>
      <p class="auth-error" id="reg-error"></p>
    </div>
    <div id="forgot-form" style="display:none">
      <div style="text-align:center;margin-bottom:20px;"><div style="font-size:36px;margin-bottom:8px;">🔑</div><div style="font-family:var(--font-head);font-size:18px;font-weight:700;">Mot de passe oublié</div></div>
      <div class="field"><label>Email</label><input type="email" id="forgot-email" placeholder="ton@email.com"/></div>
      <button class="btn-primary" onclick="sendResetEmail()">Envoyer le lien</button>
      <button class="forgot-btn" onclick="showForgotPassword(false)">← Retour</button>
      <p class="auth-error" id="forgot-error"></p>
      <p class="auth-success" id="forgot-success"></p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-logo">Vybe</div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="showPage('messages')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn" onclick="logout()" style="font-size:14px;">⏻</button>
    </div>
  </div>

  <!-- PAGE FEED -->
  <div id="page-feed" class="page active">
    <!-- STORIES -->
    <div class="stories-bar">
      <div class="story-item my-story" onclick="openAddStory()">
        <div class="story-avatar add-story-avatar" id="my-story-avatar"></div>
        <div class="story-name">Ma story</div>
      </div>
      <div id="stories-list"></div>
    </div>
    <!-- FEED POSTS -->
    <div id="feed-list"></div>
  </div>

  <!-- PAGE REELS -->
  <div id="page-reels" class="page">
    <div class="page-title" style="padding-bottom:4px;">Reels</div>
    <div id="reels-list"></div>
  </div>

  <!-- PAGE EXPLORER -->
  <div id="page-explore" class="page">
    <div class="page-title">Explorer</div>
    <div class="search-bar"><input type="text" id="search-input" placeholder="Rechercher un utilisateur..." oninput="searchUsers()"/></div>
    <div id="explore-list"></div>
  </div>

  <!-- PAGE PROFIL -->
  <div id="page-profile" class="page">
    <div class="profile-hero">
      <div class="profile-top">
        <div class="profile-avatar" id="profile-avatar"></div>
        <button class="edit-profile-btn" id="profile-action-btn" onclick="openEditModal()">Modifier</button>
      </div>
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-handle" id="profile-handle"></div>
      <div class="profile-bio" id="profile-bio"></div>
      <div class="profile-stats">
        <div class="stat-item" onclick="openFollowModal('posts')"><div class="stat-num" id="stat-posts">0</div><div class="stat-label">Posts</div></div>
        <div class="stat-item" onclick="openFollowModal('followers')"><div class="stat-num" id="stat-followers">0</div><div class="stat-label">Abonnés</div></div>
        <div class="stat-item" onclick="openFollowModal('following')"><div class="stat-num" id="stat-following">0</div><div class="stat-label">Abonnements</div></div>
      </div>
      <!-- BOUTON POSTER ICI (comme Instagram) -->
      <div class="profile-post-actions">
        <button class="profile-add-btn" onclick="openPostModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Nouveau post
        </button>
        <button class="profile-add-btn reel-btn" onclick="openReelModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          Reel
        </button>
      </div>
    </div>
    <div class="profile-divider"></div>
    <div class="profile-posts-title">Publications</div>
    <div id="profile-posts-list"></div>
  </div>

  <!-- PAGE MESSAGES -->
  <div id="page-messages" class="page">
    <div class="msg-section-title">Messages</div>
    <div id="conv-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-feed" onclick="showPage('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="nav-btn" id="nav-reels" onclick="showPage('reels')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Reels
    </button>
    <button class="nav-btn" id="nav-explore" onclick="showPage('explore')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Explorer
    </button>
    <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profil
    </button>
    <button class="nav-btn" id="nav-messages" onclick="showPage('messages')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </button>
  </div>
</div>

<!-- MODAL NOUVEAU POST -->
<div id="post-modal" class="full-modal" style="display:none">
  <div class="full-modal-card">
    <div class="modal-header"><h3>Nouveau post</h3><button class="close-btn" onclick="closePostModal()">×</button></div>
    <div style="padding:20px;overflow-y:auto;flex:1;">
      <textarea id="post-input" class="compose-input" placeholder="Quoi de neuf ? Partage..." style="width:100%;min-height:100px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:15px;resize:none;outline:none;" rows="4"></textarea>
      <div id="media-preview" class="media-preview" style="display:none;margin-top:12px;"></div>
      <div style="display:flex;gap:10px;margin-top:14px;align-items:center;">
        <label class="media-btn" title="Image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><input type="file" id="media-image" accept="image/*" style="display:none" onchange="previewMedia(this,'image')"/></label>
        <label class="media-btn" title="Vidéo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><input type="file" id="media-video" accept="video/*" style="display:none" onchange="previewMedia(this,'video')"/></label>
        <label class="media-btn" title="Audio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><input type="file" id="media-audio" accept="audio/*" style="display:none" onchange="previewMedia(this,'audio')"/></label>
        <button class="btn-primary" id="post-submit-btn" style="flex:1;padding:10px;" onclick="createPost()">Publier</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL REEL -->
<div id="reel-modal" class="full-modal" style="display:none">
  <div class="full-modal-card">
    <div class="modal-header"><h3>Ajouter un Reel</h3><button class="close-btn" onclick="closeReelModal()">×</button></div>
    <div style="padding:20px;overflow-y:auto;flex:1;">
      <textarea id="reel-caption" class="compose-input" placeholder="Décris ton reel..." style="width:100%;min-height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:15px;resize:none;outline:none;margin-bottom:14px;" rows="3"></textarea>
      <div id="reel-preview" style="display:none;margin-bottom:14px;border-radius:12px;overflow:hidden;border:1px solid var(--border);"></div>
      <label class="media-btn" style="width:100%;height:auto;border-radius:12px;padding:16px;justify-content:center;gap:10px;font-size:14px;color:var(--text);" title="Choisir une vidéo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Choisir une vidéo
        <input type="file" id="reel-video" accept="video/*" style="display:none" onchange="previewReel(this)"/>
      </label>
      <button class="btn-primary" id="reel-submit-btn" style="margin-top:14px;" onclick="createReel()">Publier le Reel</button>
    </div>
  </div>
</div>

<!-- MODAL STORY -->
<div id="story-modal" class="full-modal" style="display:none">
  <div class="full-modal-card">
    <div class="modal-header"><h3>Ajouter une Story</h3><button class="close-btn" onclick="closeStoryModal()">×</button></div>
    <div style="padding:20px;overflow-y:auto;flex:1;">
      <div id="story-preview" style="display:none;margin-bottom:14px;border-radius:12px;overflow:hidden;border:1px solid var(--border);"></div>
      <textarea id="story-text" placeholder="Texte (optionnel)..." style="width:100%;min-height:80px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);font-size:15px;resize:none;outline:none;margin-bottom:14px;" rows="3"></textarea>
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <label class="media-btn" style="flex:1;height:auto;border-radius:12px;padding:12px;justify-content:center;gap:8px;font-size:13px;color:var(--text);" title="Image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Photo
          <input type="file" id="story-image" accept="image/*" style="display:none" onchange="previewStory(this,'image')"/>
        </label>
        <label class="media-btn" style="flex:1;height:auto;border-radius:12px;padding:12px;justify-content:center;gap:8px;font-size:13px;color:var(--text);" title="Vidéo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          Vidéo
          <input type="file" id="story-video" accept="video/*" style="display:none" onchange="previewStory(this,'video')"/>
        </label>
      </div>
      <button class="btn-primary" id="story-submit-btn" onclick="createStory()">Publier la Story</button>
    </div>
  </div>
</div>

<!-- STORY VIEWER -->
<div id="story-viewer" style="display:none;position:fixed;inset:0;background:#000;z-index:400;flex-direction:column;">
  <div style="position:absolute;top:0;left:0;right:0;z-index:10;padding:16px;">
    <div id="story-progress-bars" style="display:flex;gap:4px;margin-bottom:12px;"></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="avatar" id="story-viewer-avatar" style="width:36px;height:36px;font-size:13px;"></div>
      <div id="story-viewer-name" style="color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;"></div>
      <div id="story-viewer-time" style="color:rgba(255,255,255,.6);font-size:12px;margin-left:4px;"></div>
      <button onclick="closeStoryViewer()" style="margin-left:auto;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;">×</button>
    </div>
  </div>
  <div id="story-viewer-content" style="flex:1;display:flex;align-items:center;justify-content:center;"></div>
  <div id="story-viewer-text" style="position:absolute;bottom:60px;left:0;right:0;text-align:center;color:#fff;font-size:18px;font-weight:600;padding:16px;text-shadow:0 2px 8px rgba(0,0,0,.8);"></div>
  <div style="position:absolute;inset:0;display:flex;">
    <div style="flex:1;cursor:pointer;" onclick="prevStory()"></div>
    <div style="flex:1;cursor:pointer;" onclick="nextStory()"></div>
  </div>
</div>

<!-- MODAL COMMENTAIRES -->
<div class="modal-overlay" id="comments-modal">
  <div class="modal-sheet">
    <div class="modal-header"><h3>Commentaires</h3><button class="close-btn" onclick="closeComments()">×</button></div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-input-area">
      <div class="avatar" id="comment-avatar" style="width:32px;height:32px;font-size:12px;"></div>
      <input type="text" id="comment-input" placeholder="Écrire un commentaire..." onkeydown="if(event.key==='Enter') submitComment()"/>
      <button class="send-btn" onclick="submitComment()">➤</button>
    </div>
  </div>
</div>

<!-- MODAL ABONNÉS/ABONNEMENTS -->
<div class="modal-overlay" id="follow-modal">
  <div class="modal-sheet">
    <div class="modal-header"><h3 id="follow-modal-title">Abonnés</h3><button class="close-btn" onclick="closeFollowModal()">×</button></div>
    <div class="comments-list" id="follow-modal-list"></div>
  </div>
</div>

<!-- CHAT PRIVÉ -->
<div id="chat-view">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:13px;"></div>
    <div class="chat-with" id="chat-with-name"></div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="emoji-picker" id="emoji-picker" style="display:none"></div>
  <div class="chat-input-bar">
    <button class="emoji-toggle-btn" onclick="toggleEmojiPicker()">😊</button>
    <label class="chat-media-btn" title="Média">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <input type="file" id="chat-media-input" accept="image/*,video/*,audio/*" style="display:none" onchange="sendChatMedia(this)"/>
    </label>
    <input type="text" id="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMessage()"/>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- EDIT PROFIL -->
<div id="edit-modal">
  <div class="edit-card">
    <h3>Modifier le profil</h3>
    <div class="field"><label>Prénom &amp; Nom</label><input type="text" id="edit-name"/></div>
    <div class="field"><label>Bio</label><input type="text" id="edit-bio" placeholder="Parle de toi..."/></div>
    <div class="field"><label>Nouveau mot de passe (laisser vide pour garder)</label><input type="password" id="edit-pass"/></div>
    <div class="edit-actions">
      <button class="edit-profile-btn" onclick="closeEditModal()">Annuler</button>
      <button class="btn-primary" onclick="saveProfile()">Sauvegarder</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
